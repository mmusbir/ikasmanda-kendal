<!DOCTYPE html>
<html class="light" lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Lapak Alumni | IKA SMANDA Kendal</title>
  <link href="https://www.google.com/s2/favicons?domain=ikasmanda.test&sz=64" id="siteFavicon" rel="icon" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1560BD",
            accent: "#2E80F0",
            "dark-navy": "#0D1F3C",
            "background-light": "#F5F8FE"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"],
            serif: ["DM Serif Display", "serif"]
          },
          boxShadow: {
            soft: "0 20px 40px rgba(13, 31, 60, 0.12)"
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background: radial-gradient(circle at 20% 0, #eef4ff 0%, #f5f8fe 50%, #edf3ff 100%);
      min-height: 100dvh;
    }
    .font-serif { font-family: "DM Serif Display", serif; }
    .icon-svg {
      display: inline-block;
      flex-shrink: 0;
    }
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 37%, #e2e8f0 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }
  </style>
</head>
<body class="text-slate-900">
  <nav class="sticky top-0 z-50 border-b border-primary/10 bg-white/85 backdrop-blur-md">
    <div class="mx-auto flex h-14 max-w-7xl items-center justify-between px-4">
      <a class="flex items-center gap-3 text-primary font-serif text-2xl font-bold tracking-tight" href="/">
        <img id="siteLogoImage" class="hidden h-10 w-auto rounded-md object-contain" alt="Logo IKA SMANDA" />
        <span id="siteLogoText">IKA SMANDA</span>
      </a>
      <div class="hidden items-center gap-6 md:flex">
        <a class="text-sm font-semibold text-dark-navy hover:text-primary transition-colors" href="/">Beranda</a>
        <a class="text-sm font-semibold text-dark-navy hover:text-primary transition-colors" href="/direktori">Direktori</a>
        <a class="text-sm font-semibold text-primary" href="/lapak">Lapak</a>
        <a class="rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white shadow-soft transition hover:bg-accent" href="/pendaftaran">Pendaftaran</a>
      </div>
      <button class="p-2 text-dark-navy md:hidden" id="menuBtn" type="button">
        <span class="icon-svg">
          <svg aria-hidden="true" class="h-8 w-8" fill="none" viewBox="0 0 24 24">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
          </svg>
        </span>
      </button>
    </div>
    <div class="hidden border-t border-primary/10 bg-white px-5 py-4 md:hidden" id="mobileMenu">
      <div class="flex flex-col gap-3">
        <a class="rounded-lg px-3 py-2 font-semibold hover:bg-primary/10" href="/">Beranda</a>
        <a class="rounded-lg px-3 py-2 font-semibold hover:bg-primary/10" href="/direktori">Direktori</a>
        <a class="rounded-lg bg-primary/10 px-3 py-2 font-semibold text-primary" href="/lapak">Lapak</a>
        <a class="mt-2 rounded-lg bg-primary px-4 py-2.5 text-center text-sm font-bold text-white" href="/pendaftaran">Pendaftaran</a>
      </div>
    </div>
  </nav>

  <header class="bg-dark-navy px-6 py-10 md:py-12">
    <div class="mx-auto max-w-6xl">
      <div>
        <p class="inline-flex rounded-full border border-white/25 px-4 py-1 text-xs font-bold uppercase tracking-[0.2em] text-cyan-100">
          Lapak Alumni
        </p>
        <h1 class="mt-3 font-serif text-3xl leading-tight text-white md:text-4xl">Temukan usaha alumni dalam satu halaman penuh</h1>
        <p class="mt-3 max-w-2xl text-sm text-blue-100 md:text-base">
          Cari usaha berdasarkan nama, pemilik, dan kategori untuk mendukung jejaring bisnis alumni IKA SMANDA.
        </p>
      </div>
    </div>
  </header>

  <main class="px-4 py-8 md:py-10">
    <section class="mx-auto max-w-6xl">
      <div class="rounded-2xl border border-primary/10 bg-white p-4 shadow-soft md:p-5">
        <div class="grid grid-cols-1 gap-2.5 md:grid-cols-4">
          <div class="relative md:col-span-3">
            <span class="icon-svg absolute left-3 top-3 text-slate-400">
              <svg aria-hidden="true" class="h-5 w-5" fill="none" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.8"/>
                <path d="m20 20-4.2-4.2" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
              </svg>
            </span>
            <input class="w-full rounded-xl border-slate-200 pl-10 pr-3 py-2.5 focus:border-primary focus:ring-primary" id="searchUsaha" placeholder="Cari nama usaha, pemilik, atau no. HP usaha..." type="text" />
          </div>
          <select class="rounded-xl border-slate-200 px-3 py-2.5 focus:border-primary focus:ring-primary" id="filterKategori">
            <option value="">Semua Kategori</option>
          </select>
        </div>

        <div class="mt-4 flex flex-wrap items-center justify-between gap-3">
          <p class="text-sm text-slate-600" id="summaryText">Memuat data...</p>
          <div class="flex items-center gap-2">
            <button class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" id="resetFilterBtn" type="button">Reset Filter</button>
            <a class="rounded-lg bg-primary px-3 py-2 text-sm font-semibold text-white hover:bg-accent transition" href="/pendaftaran">Daftarkan Usaha</a>
          </div>
        </div>
      </div>

      <div class="mt-6 hidden flex-wrap gap-2" id="activeFilterChips"></div>
      <div class="mt-5 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4" id="usahaGrid"></div>
      <div class="mt-6 flex flex-wrap justify-center gap-2" id="usahaPagination"></div>
    </section>
  </main>

  <script>
    const API_URL = '/api';
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

    const usahaState = {
      data: [],
      page: 1,
      totalPages: 1,
      total: 0,
      loading: false,
      filters: {
        search: '',
        kategori: ''
      }
    };

    const categoryIcon = (cat) => {
      const map = {
        Kuliner: `
          <svg aria-hidden="true" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path d="M7 3v8M10 3v8M7 7h3M14 3v18m0-10c2.2 0 4-1.8 4-4V3h-4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        `,
        Teknologi: `
          <svg aria-hidden="true" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
            <rect x="7" y="7" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
          </svg>
        `,
        Fashion: `
          <svg aria-hidden="true" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path d="m9 4 3 2 3-2 3 4-2 2 1 10H7l1-10-2-2 3-4Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        `,
        Jasa: `
          <svg aria-hidden="true" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path d="M4 18h16M7 18V8l5-3 5 3v10M10 12h4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        `
      };
      return map[cat] || `
        <svg aria-hidden="true" class="h-6 w-6" fill="none" viewBox="0 0 24 24">
          <path d="M4 10h16v10H4zM6 10V6h12v4" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8"/>
        </svg>
      `;
    };

    const toTelHref = (value) => `tel:${String(value || '').replace(/[^\d+]/g, '')}`;

    const setSiteBranding = async () => {
      try {
        const res = await fetch(`${API_URL}/site-settings`);
        const result = await res.json();
        if (!result.success || !result.data) return;
        if (result.data.logo_text) document.getElementById('siteLogoText').textContent = result.data.logo_text;
        if (result.data.logo_image_url) {
          const logoImage = document.getElementById('siteLogoImage');
          logoImage.src = result.data.logo_image_url;
          logoImage.classList.remove('hidden');
          document.getElementById('siteLogoText').classList.add('hidden');
        }
        if (result.data.favicon_url) document.getElementById('siteFavicon').href = result.data.favicon_url;
      } catch (err) {
        console.error('Failed to fetch site settings', err);
      }
    };

    const loadLapakCategories = async () => {
      const select = document.getElementById('filterKategori');
      try {
        const res = await fetch(`${API_URL}/lapak-categories`);
        const result = await res.json();
        (result.data || []).forEach((item) => {
          const option = document.createElement('option');
          option.value = item.name;
          option.textContent = item.name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to fetch lapak categories', err);
        ['Kuliner', 'Jasa', 'Fashion', 'Teknologi'].forEach((name) => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
      }
    };

    const updateSummary = () => {
      const summary = document.getElementById('summaryText');
      if (usahaState.loading) {
        summary.textContent = 'Sedang memuat data...';
        return;
      }
      summary.textContent = `${usahaState.total} lapak ditemukan, halaman ${usahaState.page} dari ${Math.max(usahaState.totalPages, 1)}`;
    };

    const renderFilterChips = () => {
      const chips = document.getElementById('activeFilterChips');
      chips.innerHTML = '';

      const entries = [
        ['Pencarian', usahaState.filters.search],
        ['Kategori', usahaState.filters.kategori]
      ].filter((entry) => Boolean(entry[1]));

      if (!entries.length) {
        chips.classList.add('hidden');
        return;
      }

      chips.classList.remove('hidden');
      entries.forEach(([label, value]) => {
        const chip = document.createElement('span');
        chip.className = 'inline-flex items-center gap-1 rounded-full bg-primary/10 px-3 py-1 text-xs font-semibold text-primary';
        chip.textContent = `${label}: ${value}`;
        chips.appendChild(chip);
      });
    };

    const renderLoadingSkeleton = () => {
      const grid = document.getElementById('usahaGrid');
      grid.innerHTML = Array.from({ length: 6 }).map(() => `
        <article class="rounded-2xl border border-primary/10 bg-white p-4">
          <div class="h-12 w-12 rounded-xl skeleton"></div>
          <div class="mt-4 h-5 w-2/3 rounded skeleton"></div>
          <div class="mt-3 h-4 w-1/3 rounded skeleton"></div>
          <div class="mt-6 h-4 w-1/2 rounded skeleton"></div>
        </article>
      `).join('');
    };

    const renderUsaha = () => {
      const grid = document.getElementById('usahaGrid');
      if (!usahaState.data.length) {
        grid.innerHTML = `
          <div class="col-span-1 rounded-2xl border border-dashed border-slate-300 bg-white p-6 text-center text-slate-500 sm:col-span-2 lg:col-span-4">
            <p class="text-lg font-semibold text-slate-700">Lapak tidak ditemukan</p>
            <p class="mt-2 text-sm">Ubah kata kunci atau kategori, atau daftarkan usaha baru melalui pendaftaran alumni.</p>
            <a class="mt-4 inline-flex rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white hover:bg-accent transition" href="/pendaftaran">Buka Pendaftaran</a>
          </div>
        `;
        updateSummary();
        renderPagination();
        renderFilterChips();
        return;
      }

      grid.innerHTML = usahaState.data.map((item) => `
        <article class="flex h-full flex-col rounded-2xl border border-primary/10 bg-white p-4 shadow-sm transition hover:-translate-y-1 hover:shadow-lg">
          <div class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-primary">
            ${categoryIcon(item.kategori)}
          </div>
          <div class="flex flex-1 flex-col">
            <h3 class="line-clamp-2 text-lg font-bold text-dark-navy">${item.nama_usaha}</h3>
            <div class="mt-2">
              <p class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-bold uppercase tracking-wide text-slate-600">${item.kategori}</p>
            </div>
            <div class="mt-auto space-y-2 pt-5">
              <p class="text-sm text-slate-500">Pemilik: <span class="font-semibold text-slate-700">${item.pemilik}</span></p>
              ${item.phone_usaha ? `
                <a class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:text-accent" href="${toTelHref(item.phone_usaha)}">
                  <span class="icon-svg">
                    <svg aria-hidden="true" class="h-4 w-4" fill="none" viewBox="0 0 24 24">
                      <path d="M7.5 4.5h3l1.5 4-2 1.5a16 16 0 0 0 4 4l1.5-2 4 1.5v3A1.5 1.5 0 0 1 18 18C10.8 18 5 12.2 5 5a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/>
                    </svg>
                  </span>
                  <span>No. HP: ${item.phone_usaha}</span>
                </a>
              ` : '<p class="text-sm text-slate-400">No. HP usaha belum tersedia</p>'}
            </div>
          </div>
        </article>
      `).join('');

      updateSummary();
      renderPagination();
      renderFilterChips();
    };

    const renderPagination = () => {
      const container = document.getElementById('usahaPagination');
      container.innerHTML = '';
      if (usahaState.totalPages <= 1) return;

      const createBtn = (label, page, isActive = false) => {
        const button = document.createElement('button');
        button.className = `min-w-[40px] rounded-lg border px-3 py-2 text-sm font-bold ${isActive ? 'border-primary bg-primary text-white' : 'border-slate-300 bg-white text-slate-700 hover:bg-slate-50'}`;
        button.textContent = label;
        button.disabled = page === usahaState.page && isActive;
        button.addEventListener('click', () => {
          usahaState.page = page;
          fetchUsaha();
        });
        return button;
      };

      if (usahaState.page > 1) {
        container.appendChild(createBtn('Prev', usahaState.page - 1));
      }

      for (let i = 1; i <= usahaState.totalPages; i += 1) {
        if (i === 1 || i === usahaState.totalPages || Math.abs(i - usahaState.page) <= 1) {
          container.appendChild(createBtn(String(i), i, i === usahaState.page));
        }
      }

      if (usahaState.page < usahaState.totalPages) {
        container.appendChild(createBtn('Next', usahaState.page + 1));
      }
    };

    const fetchUsaha = async () => {
      try {
        usahaState.loading = true;
        updateSummary();
        renderLoadingSkeleton();

        const query = new URLSearchParams({
          page: usahaState.page,
          ...(usahaState.filters.search && { search: usahaState.filters.search }),
          ...(usahaState.filters.kategori && { kategori: usahaState.filters.kategori })
        });

        const res = await fetch(`${API_URL}/usaha?${query.toString()}`);
        const result = await res.json();
        if (result.success) {
          usahaState.data = result.data;
          usahaState.total = result.total;
          usahaState.totalPages = result.totalPages;
        } else {
          usahaState.data = [];
          usahaState.total = 0;
          usahaState.totalPages = 1;
        }
      } catch (err) {
        console.error('Failed to fetch usaha', err);
        usahaState.data = [];
        usahaState.total = 0;
        usahaState.totalPages = 1;
      } finally {
        usahaState.loading = false;
        renderUsaha();
      }
    };

    let searchTimeout;
    document.getElementById('searchUsaha').addEventListener('input', (event) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        usahaState.filters.search = event.target.value.trim();
        usahaState.page = 1;
        fetchUsaha();
      }, 350);
    });

    document.getElementById('filterKategori').addEventListener('change', (event) => {
      usahaState.filters.kategori = event.target.value;
      usahaState.page = 1;
      fetchUsaha();
    });

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
      usahaState.filters = { search: '', kategori: '' };
      usahaState.page = 1;
      document.getElementById('searchUsaha').value = '';
      document.getElementById('filterKategori').value = '';
      fetchUsaha();
    });

    setSiteBranding();
    loadLapakCategories();
    fetchUsaha();
  </script>
</body>
</html>
