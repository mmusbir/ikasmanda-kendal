<!DOCTYPE html>
<html class="light" lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Direktori Alumni | IKA SMANDA Kendal</title>
  <link href="https://www.google.com/s2/favicons?domain=ikasmanda.test&sz=64" id="siteFavicon" rel="icon" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1560BD",
            accent: "#2E80F0",
            "dark-navy": "#0D1F3C",
            "background-light": "#F5F8FE"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"],
            serif: ["DM Serif Display", "serif"]
          },
          boxShadow: {
            soft: "0 20px 40px rgba(13, 31, 60, 0.12)"
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background: radial-gradient(circle at 20% 0, #eef4ff 0%, #f5f8fe 50%, #edf3ff 100%);
      min-height: 100dvh;
    }
    .font-serif { font-family: "DM Serif Display", serif; }
    .icon-svg {
      display: inline-block;
      flex-shrink: 0;
    }
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 37%, #e2e8f0 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }
  </style>
</head>
<body class="text-slate-900">
  <nav class="sticky top-0 z-50 border-b border-primary/10 bg-white/85 backdrop-blur-md">
    <div class="mx-auto flex h-14 max-w-7xl items-center justify-between px-4">
      <a class="flex items-center gap-3 text-primary font-serif text-2xl font-bold tracking-tight" href="/">
        <img id="siteLogoImage" class="hidden h-10 w-auto rounded-md object-contain" alt="Logo IKA SMANDA" />
        <span id="siteLogoText">IKA SMANDA</span>
      </a>
      <div class="hidden items-center gap-6 md:flex">
        <a class="text-sm font-semibold text-dark-navy hover:text-primary transition-colors" href="/">Beranda</a>
        <a class="text-sm font-semibold text-primary" href="/direktori">Direktori</a>
        <a class="text-sm font-semibold text-dark-navy hover:text-primary transition-colors" href="/lapak">Lapak</a>
        <a class="rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white shadow-soft transition hover:bg-accent" href="/pendaftaran">Pendaftaran</a>
      </div>
      <button class="p-2 text-dark-navy md:hidden" id="menuBtn" type="button">
        <span class="icon-svg">
          <svg aria-hidden="true" class="h-8 w-8" fill="none" viewBox="0 0 24 24">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
          </svg>
        </span>
      </button>
    </div>
    <div class="hidden border-t border-primary/10 bg-white px-5 py-4 md:hidden" id="mobileMenu">
      <div class="flex flex-col gap-3">
        <a class="rounded-lg px-3 py-2 font-semibold hover:bg-primary/10" href="/">Beranda</a>
        <a class="rounded-lg bg-primary/10 px-3 py-2 font-semibold text-primary" href="/direktori">Direktori</a>
        <a class="rounded-lg px-3 py-2 font-semibold hover:bg-primary/10" href="/lapak">Lapak</a>
        <a class="mt-2 rounded-lg bg-primary px-4 py-2.5 text-center text-sm font-bold text-white" href="/pendaftaran">Pendaftaran</a>
      </div>
    </div>
  </nav>

  <header class="bg-dark-navy px-6 py-10 md:py-12">
    <div class="mx-auto max-w-6xl">
      <div>
        <p class="inline-flex rounded-full border border-white/25 px-4 py-1 text-xs font-bold uppercase tracking-[0.2em] text-cyan-100">
          Direktori Alumni
        </p>
        <h1 class="mt-3 font-serif text-3xl leading-tight text-white md:text-4xl">Temukan alumni lintas angkatan lebih cepat</h1>
        <p class="mt-3 max-w-2xl text-sm text-blue-100 md:text-base">
          Gunakan filter nama, angkatan, dan profesi untuk menelusuri jaringan alumni IKA SMANDA secara terstruktur.
        </p>
      </div>
    </div>
  </header>

  <main class="px-4 py-8 md:py-10">
    <section class="mx-auto max-w-6xl">
      <div class="rounded-2xl border border-primary/10 bg-white p-4 shadow-soft md:p-5">
        <div class="grid grid-cols-1 gap-2.5 md:grid-cols-4">
          <div class="relative md:col-span-2">
            <span class="icon-svg absolute left-3 top-3 text-slate-400">
              <svg aria-hidden="true" class="h-5 w-5" fill="none" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.8"/>
                <path d="m20 20-4.2-4.2" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
              </svg>
            </span>
            <input class="w-full rounded-xl border-slate-200 pl-10 pr-3 py-2.5 focus:border-primary focus:ring-primary" id="searchAlumni" placeholder="Cari nama atau kota..." type="text" />
          </div>
          <select class="rounded-xl border-slate-200 px-3 py-2.5 focus:border-primary focus:ring-primary" id="filterAngkatan">
            <option value="">Semua Angkatan</option>
          </select>
          <select class="rounded-xl border-slate-200 px-3 py-2.5 focus:border-primary focus:ring-primary" id="filterProfesi">
            <option value="">Semua Profesi</option>
            <option value="PNS">PNS/TNI/Polri</option>
            <option value="Swasta">Karyawan Swasta</option>
            <option value="Wirausaha">Wirausaha</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div class="mt-4 flex flex-wrap items-center justify-between gap-3">
          <p class="text-sm text-slate-600" id="summaryText">Memuat data...</p>
          <div class="flex items-center gap-2">
            <button class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" id="resetFilterBtn" type="button">Reset Filter</button>
            <a class="rounded-lg bg-primary px-3 py-2 text-sm font-semibold text-white hover:bg-accent transition" href="/pendaftaran">Tambah Alumni</a>
          </div>
        </div>
      </div>

      <div class="mt-6 hidden flex-wrap gap-2" id="activeFilterChips"></div>
      <div class="mt-5 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4" id="alumniGrid"></div>
      <div class="mt-6 flex flex-wrap justify-center gap-2" id="alumniPagination"></div>
    </section>
  </main>

  <script>
    const API_URL = '/api';
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

    const alumniState = {
      data: [],
      page: 1,
      totalPages: 1,
      total: 0,
      loading: false,
      filters: {
        search: '',
        angkatan: '',
        profesi: ''
      }
    };

    const setSiteBranding = async () => {
      try {
        const res = await fetch(`${API_URL}/site-settings`);
        const result = await res.json();
        if (!result.success || !result.data) return;
        if (result.data.logo_text) document.getElementById('siteLogoText').textContent = result.data.logo_text;
        if (result.data.logo_image_url) {
          const logoImage = document.getElementById('siteLogoImage');
          logoImage.src = result.data.logo_image_url;
          logoImage.classList.remove('hidden');
          document.getElementById('siteLogoText').classList.add('hidden');
        }
        if (result.data.favicon_url) document.getElementById('siteFavicon').href = result.data.favicon_url;
      } catch (err) {
        console.error('Failed to fetch site settings', err);
      }
    };

    const fillAngkatanOptions = () => {
      const select = document.getElementById('filterAngkatan');
      const currentYear = new Date().getFullYear();
      for (let i = currentYear; i >= 1980; i -= 1) {
        const option = document.createElement('option');
        option.value = String(i);
        option.textContent = `Lulus Tahun ${i}`;
        select.appendChild(option);
      }
    };

    const getInitials = (name) => (name || '')
      .split(' ')
      .map((n) => n[0])
      .slice(0, 2)
      .join('')
      .toUpperCase();

    const updateSummary = () => {
      const summary = document.getElementById('summaryText');
      if (alumniState.loading) {
        summary.textContent = 'Sedang memuat data...';
        return;
      }
      summary.textContent = `${alumniState.total} alumni ditemukan, halaman ${alumniState.page} dari ${Math.max(alumniState.totalPages, 1)}`;
    };

    const renderFilterChips = () => {
      const chips = document.getElementById('activeFilterChips');
      chips.innerHTML = '';

      const entries = [
        ['Pencarian', alumniState.filters.search],
        ['Angkatan', alumniState.filters.angkatan],
        ['Profesi', alumniState.filters.profesi]
      ].filter((entry) => Boolean(entry[1]));

      if (!entries.length) {
        chips.classList.add('hidden');
        return;
      }

      chips.classList.remove('hidden');
      entries.forEach(([label, value]) => {
        const chip = document.createElement('span');
        chip.className = 'inline-flex items-center gap-1 rounded-full bg-primary/10 px-3 py-1 text-xs font-semibold text-primary';
        chip.textContent = `${label}: ${value}`;
        chips.appendChild(chip);
      });
    };

    const renderLoadingSkeleton = () => {
      const grid = document.getElementById('alumniGrid');
      grid.innerHTML = Array.from({ length: 6 }).map(() => `
        <article class="rounded-2xl border border-primary/10 bg-white p-4">
          <div class="flex items-center gap-3">
            <div class="h-12 w-12 rounded-full skeleton"></div>
            <div class="flex-1">
              <div class="h-4 w-2/3 rounded skeleton"></div>
              <div class="mt-2 h-3 w-1/3 rounded skeleton"></div>
            </div>
          </div>
          <div class="mt-4 h-3 w-1/2 rounded skeleton"></div>
        </article>
      `).join('');
    };

    const renderAlumni = () => {
      const grid = document.getElementById('alumniGrid');
      if (!alumniState.data.length) {
        grid.innerHTML = `
          <div class="col-span-1 rounded-2xl border border-dashed border-slate-300 bg-white p-6 text-center text-slate-500 sm:col-span-2 lg:col-span-4">
            <p class="text-base font-semibold text-slate-700">Data alumni tidak ditemukan</p>
            <p class="mt-2 text-sm">Ubah filter pencarian atau tambahkan data alumni baru.</p>
            <a class="mt-4 inline-flex rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white hover:bg-accent transition" href="/pendaftaran">Buka Pendaftaran</a>
          </div>
        `;
        updateSummary();
        renderPagination();
        renderFilterChips();
        return;
      }

      grid.innerHTML = alumniState.data.map((al) => `
        <article class="rounded-2xl border border-primary/10 bg-white p-4 shadow-sm transition hover:-translate-y-1 hover:shadow-lg">
          <div class="flex items-start gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-primary text-lg font-bold text-white">${getInitials(al.nama)}</div>
            <div class="flex-1">
              <h3 class="font-bold text-dark-navy">${al.nama}</h3>
              <div class="mt-1 flex items-center gap-2 text-xs text-slate-500">
                <span class="rounded-full bg-primary/10 px-2 py-0.5 font-bold text-primary">${al.angkatan}</span>
                <span>${al.kota || 'Domisili belum diisi'}</span>
              </div>
              <p class="mt-2 text-sm text-slate-600">${al.profesi || 'Profesi belum diisi'}</p>
            </div>
          </div>
        </article>
      `).join('');

      updateSummary();
      renderPagination();
      renderFilterChips();
    };

    const renderPagination = () => {
      const container = document.getElementById('alumniPagination');
      container.innerHTML = '';
      if (alumniState.totalPages <= 1) return;

      const createBtn = (label, page, isActive = false) => {
        const button = document.createElement('button');
        button.className = `min-w-[40px] rounded-lg border px-3 py-2 text-sm font-bold ${isActive ? 'border-primary bg-primary text-white' : 'border-slate-300 bg-white text-slate-700 hover:bg-slate-50'}`;
        button.textContent = label;
        button.disabled = page === alumniState.page && isActive;
        button.addEventListener('click', () => {
          alumniState.page = page;
          fetchAlumni();
        });
        return button;
      };

      if (alumniState.page > 1) {
        container.appendChild(createBtn('Prev', alumniState.page - 1));
      }

      for (let i = 1; i <= alumniState.totalPages; i += 1) {
        if (
          i === 1 ||
          i === alumniState.totalPages ||
          Math.abs(i - alumniState.page) <= 1
        ) {
          container.appendChild(createBtn(String(i), i, i === alumniState.page));
        }
      }

      if (alumniState.page < alumniState.totalPages) {
        container.appendChild(createBtn('Next', alumniState.page + 1));
      }
    };

    const fetchAlumni = async () => {
      try {
        alumniState.loading = true;
        updateSummary();
        renderLoadingSkeleton();

        const query = new URLSearchParams({
          page: alumniState.page,
          ...(alumniState.filters.search && { search: alumniState.filters.search }),
          ...(alumniState.filters.angkatan && { angkatan: alumniState.filters.angkatan }),
          ...(alumniState.filters.profesi && { profesi: alumniState.filters.profesi })
        });

        const res = await fetch(`${API_URL}/alumni?${query.toString()}`);
        const result = await res.json();
        if (result.success) {
          alumniState.data = result.data;
          alumniState.total = result.total;
          alumniState.totalPages = result.totalPages;
        } else {
          alumniState.data = [];
          alumniState.total = 0;
          alumniState.totalPages = 1;
        }
      } catch (err) {
        console.error('Failed to fetch alumni', err);
        alumniState.data = [];
        alumniState.total = 0;
        alumniState.totalPages = 1;
      } finally {
        alumniState.loading = false;
        renderAlumni();
      }
    };

    let searchTimeout;
    document.getElementById('searchAlumni').addEventListener('input', (event) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        alumniState.filters.search = event.target.value.trim();
        alumniState.page = 1;
        fetchAlumni();
      }, 350);
    });

    document.getElementById('filterAngkatan').addEventListener('change', (event) => {
      alumniState.filters.angkatan = event.target.value;
      alumniState.page = 1;
      fetchAlumni();
    });

    document.getElementById('filterProfesi').addEventListener('change', (event) => {
      alumniState.filters.profesi = event.target.value;
      alumniState.page = 1;
      fetchAlumni();
    });

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
      alumniState.filters = { search: '', angkatan: '', profesi: '' };
      alumniState.page = 1;
      document.getElementById('searchAlumni').value = '';
      document.getElementById('filterAngkatan').value = '';
      document.getElementById('filterProfesi').value = '';
      fetchAlumni();
    });

    fillAngkatanOptions();
    setSiteBranding();
    fetchAlumni();
  </script>
</body>
</html>
